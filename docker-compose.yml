version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: go_concurrency_sql_db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-ecommerce_lab}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Mount scripts for auto-initialization (if needed in the future)
      #- ./scripts:/docker-entrypoint-initdb.d
    restart: always

volumes:
  postgres_data:
